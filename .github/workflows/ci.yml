on: [push, pull_request]
name: Test
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.22.x, 1.23.x, 1.24.x]
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: WillAbides/setup-go-faster@main
      with:
        go-version: ${{ matrix.go-version }}
    - uses: actions/checkout@v6
      with:
         path: './src/github.com/kevinburke/differ'
    # staticcheck needs this for GOPATH
    - run: echo "GOPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
    - run: echo "PATH=$GITHUB_WORKSPACE/bin:$PATH" >> $GITHUB_ENV
    - run: echo "GO111MODULE=on" >> $GITHUB_ENV
    - name: Run tests
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        make test
      working-directory: './src/github.com/kevinburke/differ'
